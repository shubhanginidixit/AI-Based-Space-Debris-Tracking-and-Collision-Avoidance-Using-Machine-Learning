[flake8]
# Make flake8 compatible with black's formatting choices.
# - E203: whitespace before ':' (black uses it for slice notation)
# - W503: line break before binary operator (black's style)
extend-ignore = E203, W503
# Black defaults to 88 characters per line.
max-line-length = 88
exclude =
    .git,
    __pycache__,
    scripts/__pycache__
